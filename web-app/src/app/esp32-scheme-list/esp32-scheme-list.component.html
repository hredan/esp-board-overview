<section class="scheme-list">
  <div class="header-row">
    <h2>ESP32 Partition Schemes</h2>
    <button type="button" class="back-button" routerLink="/esp32-partitions">Back to ESP32-Partitions</button>
  </div>

  <section class="filter-row">
    <mat-form-field>
      <mat-label>Memory Size</mat-label>
      <mat-select [value]="selectedMemorySizeFilter" (selectionChange)="applyMemorySizeFilter($event.value)">
        <mat-option value="all">All</mat-option>
        <mat-option *ngFor="let size of memorySizeFilterValues" [value]="size.toString()">
          {{ size | number:'1.2-2' }} MB
        </mat-option>
      </mat-select>
    </mat-form-field>
  </section>

  <div class="mat-elevation-z8">
    <table mat-table [dataSource]="sortedData" matSort (matSortChange)="sortData($event)">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
        <td mat-cell *matCellDef="let entry">{{ entry.name }}</td>
      </ng-container>

      <ng-container matColumnDef="memorySizeMb">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Memory Size </th>
        <td mat-cell *matCellDef="let entry">
          @if (entry.memorySizeMb !== null) {
            {{ entry.memorySizeMb | number:'1.2-2' }} MB
          } @else {
            N/A
          }
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="clickable-row" (click)="onRowSelect(row)"></tr>
    </table>
  </div>

  @if (isOverlayOpen) {
    <div class="overlay-backdrop" 
         role="button" 
         tabindex="0" 
         aria-label="Close overlay"
         (click)="closeOverlay()" 
         (keydown.escape)="closeOverlay()"
         (keydown.enter)="closeOverlay()"
         (keydown.space)="closeOverlay()">
      <div class="overlay-content" 
           tabindex="0"
           (click)="$event.stopPropagation()"
           (keydown)="$event.stopPropagation()">
        <div class="overlay-header">
          <h3>{{ selectedSchemeName }}</h3>
          <button type="button" class="close-button" aria-label="Close overlay" (click)="closeOverlay()">&times;</button>
        </div>
        <app-esp32-partition-view [schemeName]="selectedSchemeName" [selectedSchemeData]="selectedSchemeData"></app-esp32-partition-view>
      </div>
    </div>
  }
</section>
